[build-system]
requires = ["setuptools>=64", "wheel", "versioneer[toml]>=0.19"]
build-backend = "setuptools.build_meta"

[project]
name = "arkouda"
dynamic = ["version"]
description = "Parallel, distributed NumPy-like arrays backed by Chapel"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "U.S. Government" }]
keywords = ["HPC", "workflow", "exploratory", "analysis", "parallel", "distribute", "arrays", "Chapel"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
]

dependencies = [
  "numpy>=2.0",
  "pandas>=1.4.0,!=2.2.0",
  "pyzmq>=20.0.0",
  "typeguard==2.10.0",
  "tabulate",
  "pyfiglet",
  "versioneer",
  "matplotlib>=3.3.2",
  "h5py>=3.7.0",
  "pip",  # Consider removing if not truly required at runtime
  "types-tabulate",
  "tables>=3.10.0",
  "pyarrow<21.0.0,>=6.0.1",
  "scipy",
  "cloudpickle",
]

[project.optional-dependencies]
dev = [
  "pexpect",
  "pytest>=6.0",
  "pytest-env",
  "pytest-timeout",
  "pytest-html",
  "pytest-benchmark",
  "pytest-json-report",
  "pytest-subtests",
  "Sphinx>=5.1.1",
  "sphinx-argparse",
  "sphinx-autoapi",
  "mypy>=0.931",
  "black==25.1.0",
  "ruff==0.11.2",
  "isort==5.13.2",
  "flake8",
  "furo",
  "myst-parser",
  "linkify-it-py",
  "mathjax",
  "sphinx-autopackagesummary",
  "sphinx-design",
  "sphinx-autodoc-typehints",
  "pandas-stubs",
  "types-python-dateutil",
  "ipython",
  "pydocstyle>=6.3.0",
  "pre-commit",
  "darglint>=1.8.1",
  "pydoclint[flake8]==0.6.10",
  "numba",
]

[project.urls]
Homepage = "https://github.com/Bears-R-Us/arkouda"
"Bug Reports" = "https://github.com/Bears-R-Us/arkouda/issues"
Source = "https://github.com/Bears-R-Us/arkouda"
Chapel = "https://chapel-lang.org"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
# exclude = ["tests*", "examples*"]


[tool.setuptools.dynamic]
version = { attr = "arkouda._version.__version__" }

